name: ionicons_plus
description: Ionicons Flutter is an open-source icon set with 1,357 icons (Ionicons v8.0.13) crafted for web, iOS, Android, and desktop apps. Fork of ionicons package with updated Flutter SDK support.
version: 0.2.3
homepage: https://github.com/ultrafastwork/ionicons_plus
repository: https://github.com/ultrafastwork/ionicons_plus

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.22.4"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  fonts:
    - family: Ionicons
      fonts:
        - asset: assets/fonts/Ionicons.ttf
  #
  # For details regarding fonts in packages, see
  # https://flutter.dev/to/font-from-package
